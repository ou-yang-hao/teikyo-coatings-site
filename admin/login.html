<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeiKyo 后台登录</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand" aria-label="TeiKyo 后台介绍">
      <a href="/" target="_blank" rel="noopener" class="brand-mark">TeiKyo</a>
      <p class="eyebrow">MANAGEMENT CENTER</p>
      <h1>让产品与客户需求<br>保持清晰连接</h1>
      <p>统一维护产品资料、跟进官网询盘，并通过角色权限保护企业数据。</p>
    </section>
    <section class="login-card">
      <div>
        <p class="eyebrow">SECURE ACCESS</p>
        <h2>登录后台</h2>
        <p class="muted">请输入管理员分配给您的账号。</p>
      </div>
      <form id="login-form" class="form-stack">
        <label>用户名<input name="username" autocomplete="username" required autofocus></label>
        <label>密码<input name="password" type="password" autocomplete="current-password" required></label>
        <button class="button primary" type="submit">登录</button>
        <p id="login-error" class="form-error" role="alert" hidden></p>
      </form>
      <a href="/" target="_blank" rel="noopener" class="text-link">返回企业官网 ↗</a>
    </section>
  </main>
  <script type="module" src="/admin/login.js"></script>
</body>
</html>
